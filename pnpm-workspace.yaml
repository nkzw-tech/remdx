packages:
  - examples/*
  - packages/*

onlyBuiltDependencies:
  - esbuild
  - unrs-resolver
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.20
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.20
  vite-plus: ^0.1.20
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
